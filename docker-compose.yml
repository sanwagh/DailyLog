services:
  postgres:
    image: postgres:16
    container_name: dailylog-postgres
    environment:
      POSTGRES_DB: dailylog
      POSTGRES_USER: dailylog
      POSTGRES_PASSWORD: dailylog
    ports:
      - "5432:5432"
    volumes:
      - dailylog-postgres-data:/var/lib/postgresql/data

volumes:
  dailylog-postgres-data:
